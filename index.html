<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Učenje — ALAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --blue: #4361ee;
            --gold: #f7b731;
            --text: #fafafa;
            --muted: #b0b0b0;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .bismillah {
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 2rem;
            font-weight: 600;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--blue), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: var(--muted);
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }
        .cards {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        a.card {
            display: block;
            background: var(--surface);
            border: 1px solid rgba(67, 97, 238, 0.3);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        a.card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--blue), var(--gold));
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: left;
        }
        a.card:hover {
            border-color: var(--blue);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(67, 97, 238, 0.2);
        }
        a.card:hover::before { transform: scaleX(1); }
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .card-desc {
            color: var(--muted);
            font-size: 0.9rem;
        }
        .footer {
            margin-top: 3rem;
            color: var(--muted);
            font-size: 0.8rem;
        }
        .footer a {
            color: var(--blue);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bismillah">بِسْمِ ٱللَّهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>
        <h1>Broj 19 u Kur'anu</h1>
        <p class="subtitle">Matematičko čudo za mlade istraživače</p>

        <div class="cards">
            <a class="card" href="bs.html">
                <div class="card-title">Bosanski</div>
                <div class="card-desc">Nevjerovatni broj 19 u Kur'anu</div>
            </a>
            <a class="card" href="no.html">
                <div class="card-title">Norsk</div>
                <div class="card-desc">Det fantastiske tallet 19 i Koranen</div>
            </a>
            <a class="card" href="en.html">
                <div class="card-title">English</div>
                <div class="card-desc">The Amazing Number 19 in the Quran</div>
            </a>
        </div>

        <div class="footer">
            <p>ALAI &mdash; <a href="https://alai.no">alai.no</a></p>
        </div>
    </div>
</body>
</html>
